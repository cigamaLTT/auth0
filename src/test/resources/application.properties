spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

server.forwarded-headers-strategy=FRAMEWORK

spring.mail.host=localhost
spring.mail.port=1025

# Disable flyway for integration tests to simplify H2 setup
spring.flyway.enabled=false

# Mock Redis Properties
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

spring.config.import=optional:file:.env[.properties]

# JWT Keys for tests (Using placeholders with defaults for robustness)
jwt.private-key=${JWT_PRIVATE_KEY:MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDJ+5...}
jwt.public-key=${JWT_PUBLIC_KEY:MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAyfue...}
jwt.expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.password-reset-expiration=${JWT_PASSWORD_RESET_EXPIRATION:3600000}

# Policy Properties
PASSWORD_MIN_LENGTH=8
USERNAME_MIN_LENGTH=4
USERNAME_MAX_LENGTH=30

# CORS & Other
app.cors.allowed-origins=*
jwt.refresh-expiration=604800000
jwt.refresh-grace-period=15

# Registration Properties
app.registration.otp-expiration=${OTP_EXPIRATION_SECONDS:900}
app.registration.stream-key=${REGISTRATION_STREAM_KEY:auth:registration:stream}
app.registration.lock-prefix-email=${REGISTRATION_EMAIL_LOCK_PREFIX:auth:lock:email:}
app.registration.lock-prefix-username=${REGISTRATION_USERNAME_LOCK_PREFIX:auth:lock:username:}

# Password Reset Properties
app.password-reset.otp-expiration=${FORGOT_PASSWORD_OTP_EXPIRATION_SECONDS:900}
app.password-reset.stream-key=${FORGOT_PASSWORD_STREAM_KEY:auth:forgot-password:stream}
app.password-reset.lock-prefix-email=${FORGOT_PASSWORD_EMAIL_LOCK_PREFIX:auth:lock:forgot-password:}
