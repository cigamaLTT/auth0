spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Disable flyway for integration tests to simplify H2 setup
spring.flyway.enabled=false

# Mock Redis Properties
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

spring.config.import=optional:file:.env[.properties]

# JWT Keys for tests (Using placeholders to avoid leaking keys)
jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.expiration=${JWT_ACCESS_EXPIRATION}

# Policy Properties
PASSWORD_MIN_LENGTH=8
USERNAME_MIN_LENGTH=4
USERNAME_MAX_LENGTH=30

# CORS & Other
app.cors.allowed-origins=*
jwt.refresh-expiration=604800000
jwt.refresh-grace-period=15
