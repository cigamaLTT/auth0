spring.config.import=optional:file:.env[.properties]

spring.application.name=auth0
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.docker.compose.enabled=false

spring.threads.virtual.enabled=true

server.forwarded-headers-strategy=FRAMEWORK
server.port=${SERVER_PORT}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS}

jwt.private-key=${JWT_PRIVATE_KEY}
jwt.public-key=${JWT_PUBLIC_KEY}
jwt.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}
jwt.refresh-grace-period=${JWT_REFRESH_GRACE_PERIOD}

app.cors.allowed-origins=${CORS_ORIGINS}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=${REDIS_DATABASE}
spring.data.redis.timeout=${REDIS_TIMEOUT}

app.policy.password-min-length=${PASSWORD_MIN_LENGTH:8}
app.policy.username-min-length=${USERNAME_MIN_LENGTH:4}
app.policy.username-max-length=${USERNAME_MAX_LENGTH:30}

app.registration.otp-expiration=${OTP_EXPIRATION_SECONDS}
app.registration.stream-key=${REGISTRATION_STREAM_KEY}
app.registration.lock-prefix-email=${REGISTRATION_EMAIL_LOCK_PREFIX}
app.registration.lock-prefix-username=${REGISTRATION_USERNAME_LOCK_PREFIX}

app.password-reset.otp-expiration=${FORGOT_PASSWORD_OTP_EXPIRATION_SECONDS:900}
app.password-reset.stream-key=${FORGOT_PASSWORD_STREAM_KEY:auth:forgot-password:stream}
app.password-reset.lock-prefix-email=${FORGOT_PASSWORD_EMAIL_LOCK_PREFIX:auth:lock:forgot-password:}
jwt.password-reset-expiration=${JWT_PASSWORD_RESET_EXPIRATION:3600000}

# Security & Rate Limiting
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.requests-per-second=${RATE_LIMIT_TPS:10}

app.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:30}
app.login.lockout-duration-minutes=${LOGIN_LOCKOUT_MINUTES:60}
app.login.stream-key=${LOGIN_TRACKER_STREAM_KEY:auth:login-tracker:stream}

app.security.stream-key=${SECURITY_STREAM_KEY:auth:security:stream}

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.flywaydb=DEBUG

