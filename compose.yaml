services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "${MAIL_SMTP_PORT}:1025"
      - "${MAIL_UI_PORT}:8025"
    environment:
      MP_MAX_MESSAGES: 100

  server:
    build:
      context: .
    ports:
      - "${HOST_PORT}:${SERVER_PORT}"
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION}
      - JWT_REFRESH_GRACE_PERIOD=${JWT_REFRESH_GRACE_PERIOD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH}
      - MAIL_SMTP_TLS=${MAIL_SMTP_TLS}
      - PASSWORD_MIN_LENGTH=${PASSWORD_MIN_LENGTH}
      - USERNAME_MIN_LENGTH=${USERNAME_MIN_LENGTH}
      - USERNAME_MAX_LENGTH=${USERNAME_MAX_LENGTH}
      - OTP_EXPIRATION_SECONDS=${OTP_EXPIRATION_SECONDS}
      - REGISTRATION_STREAM_KEY=${REGISTRATION_STREAM_KEY}
      - REGISTRATION_EMAIL_LOCK_PREFIX=${REGISTRATION_EMAIL_LOCK_PREFIX}
      - REGISTRATION_USERNAME_LOCK_PREFIX=${REGISTRATION_USERNAME_LOCK_PREFIX}
      - FORGOT_PASSWORD_OTP_EXPIRATION_SECONDS=${FORGOT_PASSWORD_OTP_EXPIRATION_SECONDS}
      - FORGOT_PASSWORD_STREAM_KEY=${FORGOT_PASSWORD_STREAM_KEY}
      - FORGOT_PASSWORD_EMAIL_LOCK_PREFIX=${FORGOT_PASSWORD_EMAIL_LOCK_PREFIX}
      - JWT_PASSWORD_RESET_EXPIRATION=${JWT_PASSWORD_RESET_EXPIRATION}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  redis-data:
